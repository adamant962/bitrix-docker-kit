server {
    listen 80;
    server_name _;

    root /var/www/html;
    index index.php index.html index.htm;

    client_max_body_size 100m;

    location / {
        try_files $uri $uri/ /bitrix/urlrewrite.php?$query_string;
    }

    location ~ \.php$ {
        try_files $uri =404;

        include fastcgi_params;
        fastcgi_pass php:9000;
        fastcgi_index index.php;

        fastcgi_connect_timeout 60s;
        fastcgi_send_timeout 600s;
        fastcgi_read_timeout 600s;

        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT $document_root;

        fastcgi_param PHP_VALUE "max_execution_time=600";
    }

    location ~* ^/upload/.*\.php$ {
        deny all;
    }

    # Bitrix uses ".default" directories for themes/templates.
    # They must be accessible, otherwise admin CSS/JS can return 403.
    location ~ ^/bitrix/(themes|components|templates|gadgets|wizards)/(.*/)?\.default/ {
        try_files $uri =404;
        access_log off;
        expires 7d;
    }

    location ~ /\.(?!well-known) {
        deny all;
    }

    location ~* \.(svg|png|jpe?g|gif|webp|avif|ico|css|js|mjs|json|xml|txt|pdf|eot|otf|ttf|ttc|woff2?|mp4|mov|webm|mp3|wav|ogg)$ {
        expires 0;
        add_header Cache-Control "max-age=0, must-revalidate";
        try_files $uri =404;
    }
}
