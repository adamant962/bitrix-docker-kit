services:

  nginx:
    image: nginx:1.27-alpine
    container_name: ${COMPOSE_PROJECT_NAME:-bitrix}-nginx
    ports:
      - "${HTTP_PORT:-80}:80"
    volumes:
      - ${PROJECT_ROOT:-.}:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - php
    networks:
      default:
        aliases:
          - ${PROJECT_DOMAIN:-localhost}
    restart: unless-stopped

  php:
    build:
      context: ./docker/php
      args:
        PHP_IMAGE: ${PHP_IMAGE:-php:8.2-fpm-bookworm}
        ENABLE_XDEBUG: ${ENABLE_XDEBUG:-0}
    image: ${COMPOSE_PROJECT_NAME:-bitrix}-php:${PHP_TAG:-8.2}
    container_name: ${COMPOSE_PROJECT_NAME:-bitrix}-php
    environment:
      DB_HOST: ${DB_HOST:-db}
      DB_DATABASE: ${DB_DATABASE:-bitrix}
      DB_USER: ${DB_USER:-bitrix}
      DB_PASSWORD: ${DB_PASSWORD:-bitrix_password}
      DB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root_password}
      PHP_IDE_CONFIG: "serverName=${PROJECT_DOMAIN:-localhost}"
      TZ: ${TZ:-Europe/Moscow}
    volumes:
      - ${PROJECT_ROOT:-.}:/var/www/html
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/bitrix.ini:ro
      - ./docker/php/opcache.ini:/usr/local/etc/php/conf.d/opcache.ini:ro
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: ${DB_IMAGE:-mysql:8.0}
    container_name: ${COMPOSE_PROJECT_NAME:-bitrix}-db
    ports:
      - "${DB_PORT_EXTERNAL:-3307}:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root_password}
      MYSQL_DATABASE: ${DB_DATABASE:-bitrix}
      MYSQL_USER: ${DB_USER:-bitrix}
      MYSQL_PASSWORD: ${DB_PASSWORD:-bitrix_password}
      TZ: ${TZ:-Europe/Moscow}
    volumes:
      - db_data:/var/lib/mysql
      - ./docker/db/my.cnf:/etc/mysql/conf.d/bitrix.cnf:ro
      - ./docker/db/init:/docker-entrypoint-initdb.d:ro
    command:
      - --character-set-server=${DB_CHARSET:-utf8mb4}
      - --collation-server=${DB_COLLATION:-utf8mb4_unicode_ci}
      - --sql-mode=${DB_SQL_MODE:-}
      - --default-time-zone=${DB_TIMEZONE:-+03:00}
      - --innodb-strict-mode=0
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -p\"$${MYSQL_ROOT_PASSWORD}\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  cron:
    build:
      context: ./docker/php
      args:
        PHP_IMAGE: ${PHP_IMAGE:-php:8.2-fpm-bookworm}
        ENABLE_XDEBUG: 0
    image: ${COMPOSE_PROJECT_NAME:-bitrix}-php:${PHP_TAG:-8.2}
    container_name: ${COMPOSE_PROJECT_NAME:-bitrix}-cron
    profiles:
      - cron
    environment:
      DB_HOST: ${DB_HOST:-db}
      DB_DATABASE: ${DB_DATABASE:-bitrix}
      DB_USER: ${DB_USER:-bitrix}
      DB_PASSWORD: ${DB_PASSWORD:-bitrix_password}
      DB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root_password}
      TZ: ${TZ:-Europe/Moscow}
    volumes:
      - ${PROJECT_ROOT:-.}:/var/www/html
    command: >
      sh -c "while true; do
        php -f /var/www/html/bitrix/modules/main/tools/cron_events.php -- -agent -check;
        sleep 60;
      done"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  adminer:
    image: adminer:latest
    container_name: ${COMPOSE_PROJECT_NAME:-bitrix}-adminer
    profiles:
      - tools
    ports:
      - "${ADMINER_PORT:-8080}:8080"
    depends_on:
      - db
    restart: unless-stopped

  mailpit:
    image: axllent/mailpit:latest
    container_name: ${COMPOSE_PROJECT_NAME:-bitrix}-mailpit
    profiles:
      - tools
    ports:
      - "${MAILPIT_WEB_PORT:-8025}:8025"
    expose:
      - "1025"
    restart: unless-stopped

volumes:
  db_data:
